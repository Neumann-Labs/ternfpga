name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  sim:
    name: cocotb + verilator simulation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install verilator
        run: |
          sudo apt-get update
          sudo apt-get install -y verilator

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install cocotb + test deps
        run: |
          python -m pip install --upgrade pip
          pip install cocotb cocotb-test pytest numpy

      - name: Run simulation suite
        run: |
          if [ -f sim/Makefile ]; then
            make -C sim
          else
            echo "No sim/Makefile yet (scaffolding phase) — skipping."
          fi
